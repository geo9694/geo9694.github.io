<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的品牌</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px; 
            margin: 0 auto; 
            padding: 40px 20px;
            line-height: 1.6;
            color: #333;
        }
        h1 { color: #222; font-size: 2.5em; }
        .product { 
            background: #f5f5f5; 
            padding: 30px; 
            margin: 30px 0; 
            border-radius: 8px;
        }
        .price { 
            color: #e74c3c; 
            font-size: 1.5em; 
            font-weight: bold;
        }
        .contact { 
            background: #2c3e50; 
            color: white; 
            padding: 20px; 
            text-align: center;
            border-radius: 8px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <h1>品牌名称</h1>
    <p>简单介绍你的品牌或业务...</p>
    
    <div class="product">
        <h2>产品名称</h2>
        <p>产品描述，特点，优势...</p>
        <p class="price">$99.00</p>
        <p>📧 联系购买：your-email@example.com</p>
    </div>
    
    <div class="contact">
        <h3>联系我们</h3>
        <p>邮箱：your-email@example.com</p>
        <p>微信：your-wechat</p>
    </div>
</body>
</html>
